<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web Viewer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #000;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    input {
      width: 60%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-left: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    iframe {
      margin-top: 20px;
      width: 90%;
      height: 500px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
    }
  </style>
</head>

<body>

<header>
  🌐 Vercel Web Viewer
</header>

<div class="container">
  <input id="url" placeholder="Enter a website..." />
  <button onclick="loadSite()">View</button>

  <iframe id="viewer"></iframe>
</div>

<script>
  function loadSite() {
    let url = document.getElementById("url").value.trim();

    if (!url) return;

    if (!url.startsWith("http")) {
      url = "https://" + url;
    }

    document.getElementById("viewer").src = url;
  }
</script>

</body>
</html>
